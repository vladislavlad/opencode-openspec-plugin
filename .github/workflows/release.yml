name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Least privilege by default; the publish job widens this to what it needs.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # ships npm >= 11.5, required for trusted publishing

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # No token: authentication is via GitHub OIDC (configured as a Trusted
      # Publisher on npmjs.com). Provenance is attached automatically.
      - name: Publish to npm
        run: npm publish --access public

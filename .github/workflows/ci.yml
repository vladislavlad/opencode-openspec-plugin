name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal default token scope; jobs opt into more only if they need it.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
